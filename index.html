<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Avaliação Acadêmica</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <style>
        .star-rating { direction: rtl; display: inline-flex; }
        .star-rating input { display: none; }
        .star-rating label { color: #ddd; font-size: 1.5rem; padding: 0 0.1rem; cursor: pointer; }
        .star-rating label:hover, .star-rating label:hover ~ label, .star-rating input:checked ~ label { color: #f39c12; }
    </style>
</head>
<body>
    <div class="container mt-4">
        <div id="view-professor">
            <input type="file" id="upload-master" class="form-control mb-3">
            <div id="lista-grupos"></div>
        </div>
        <div id="view-aluno" class="d-none">
            <div id="container-criterios"></div>
            <button class="btn btn-primary w-100" onclick="gerarTokenAluno()">Gerar Token</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script>
        let criteriosConfig = [
            { id: 'c_1', label: 'Trabalho em Equipe', peso: 8 },
            { id: 'c_2', label: 'Qualidade dos Slides', peso: 8 }
        ];

        function renderCriteriosForm() {
            const container = document.getElementById('container-criterios');
            if(!container) return;
            container.innerHTML = criteriosConfig.map((c, index) => `
                <div class="mb-3 border p-2">
                    <strong>${index + 1}. ${c.label}</strong>
                    <div class="star-rating">
                        <input type="radio" id="s5-${c.id}" name="crit-${c.id}" value="5"><label for="s5-${c.id}" class="fa-solid fa-star"></label>
                        <input type="radio" id="s4-${c.id}" name="crit-${c.id}" value="4"><label for="s4-${c.id}" class="fa-solid fa-star"></label>
                        <input type="radio" id="s3-${c.id}" name="crit-${c.id}" value="3"><label for="s3-${c.id}" class="fa-solid fa-star"></label>
                        <input type="radio" id="s2-${c.id}" name="crit-${c.id}" value="2"><label for="s2-${c.id}" class="fa-solid fa-star"></label>
                        <input type="radio" id="s1-${c.id}" name="crit-${c.id}" value="1"><label for="s1-${c.id}" class="fa-solid fa-star"></label>
                    </div>
                </div>
            `).join('');
        }

        document.getElementById('upload-master').addEventListener('change', (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (evt) => {
                const workbook = XLSX.read(new Uint8Array(evt.target.result), { type: 'array' });
                // Lógica de leitura simplificada
                const abaCrit = workbook.SheetNames.find(n => n.toLowerCase().includes('crit'));
                if(abaCrit) {
                    const json = XLSX.utils.sheet_to_json(workbook.Sheets[abaCrit]);
                    criteriosConfig = json.map((item, idx) => ({
                        id: `c_${idx+1}`,
                        label: item.Criterio || item.Critério,
                        peso: item.Peso || 1
                    }));
                }
                renderCriteriosForm();
                alert("Critérios carregados: " + criteriosConfig.length);
            };
            reader.readAsArrayBuffer(file);
        });

        // Inicialização
        document.addEventListener('DOMContentLoaded', renderCriteriosForm);
        
        // Correção de roteamento
        const params = new URLSearchParams(window.location.search);
        if(params.has('gId')) {
            document.getElementById('view-professor').classList.add('d-none');
            document.getElementById('view-aluno').classList.remove('d-none');
        }
    </script>
</body>
</html>

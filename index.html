<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Avaliação Acadêmica por Pares</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <style>
        /* Garantia de rolagem vertical */
        html, body { height: 100%; overflow-y: auto !important; }
        :root { --primary-color: #2c3e50; --secondary-color: #18bc9c; --bg-light: #f8f9fa; }
        body { background-color: var(--bg-light); font-family: 'Segoe UI', sans-serif; color: #333; }
        .navbar-academic { background-color: var(--primary-color); color: white; }
        .card-group { transition: transform 0.2s; border-left: 5px solid var(--primary-color); }
        .active-group-card { border-left: 5px solid var(--secondary-color) !important; background-color: #e8f8f5; }
        .star-rating { direction: rtl; display: inline-flex; }
        .star-rating input { display: none; }
        .star-rating label { color: #ddd; font-size: 1.5rem; padding: 0 0.1rem; cursor: pointer; }
        .star-rating label:hover, .star-rating label:hover ~ label, .star-rating input:checked ~ label { color: #f39c12; }
        .cronometro { font-size: 3rem; font-weight: bold; font-family: monospace; color: var(--primary-color); }
        .crit-num { font-size: 1.1rem; font-weight: 800; color: var(--primary-color); min-width: 25px; display: inline-block; }
    </style>
</head>
<body>
    <nav class="navbar navbar-academic mb-4 shadow-sm">
        <div class="container"><span class="navbar-brand text-white">Avaliação Acadêmica</span></div>
    </nav>
    <div class="container mb-5">
        <div id="view-professor" class="view-section">
            <div class="card p-3 mb-4 shadow-sm">
                <h5>1. Carregar Configuração</h5>
                <input type="file" id="upload-master" class="form-control" accept=".xlsx, .xls">
            </div>
            <div id="lista-grupos" class="row g-3"></div>
            <div id="sessao-ativa" class="d-none card p-3 mt-3">
                <h4 id="ativo-nome"></h4>
                <div class="cronometro" id="cronometro">15:00</div>
                <button class="btn btn-danger" onclick="finalizarApresentacao()">Finalizar</button>
            </div>
            <div id="dashboard-resultados" class="mt-5">
                <h3>Dashboard</h3>
                <canvas id="chartCriterios"></canvas>
            </div>
        </div>
        <div id="view-aluno" class="view-section d-none">
            <div class="card p-4 shadow">
                <form id="form-avaliacao" onsubmit="gerarTokenAluno(event)">
                    <div id="container-criterios"></div>
                    <button type="submit" class="btn btn-primary w-100 mt-3">Gerar Token</button>
                </form>
            </div>
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>
        let dbGrupos = JSON.parse(localStorage.getItem('acad_grupos')) || [];
        let criteriosConfig = JSON.parse(localStorage.getItem('acad_criterios')) || [];
        let dbAvaliacoes = [];

        function renderCriteriosForm() {
            const container = document.getElementById('container-criterios');
            if(!container) return;
            container.innerHTML = criteriosConfig.map((c, index) => `
                <div class="mb-3 p-2 border shadow-sm">
                    <span class="crit-num">${index + 1}.</span> <strong>${c.label}</strong>
                    <div class="star-rating">
                        ${[5,4,3,2,1].map(v => `<input type="radio" id="s${v}-${c.id}" name="crit-${c.id}" value="${v}" required><label for="s${v}-${c.id}" class="fa-solid fa-star"></label>`).join('')}
                    </div>
                </div>
            `).join('');
        }

        document.getElementById('upload-master').addEventListener('change', (e) => {
            const reader = new FileReader();
            reader.onload = (evt) => {
                const workbook = XLSX.read(new Uint8Array(evt.target.result), { type: 'array' });
                // Limpeza total de cache para evitar "critérios zumbis"
                localStorage.clear();
                
                const abaCrit = workbook.SheetNames.find(n => n.toLowerCase().includes('crit'));
                if(abaCrit) {
                    criteriosConfig = XLSX.utils.sheet_to_json(workbook.Sheets[abaCrit]).map((item, idx) => ({
                        id: `c_${idx+1}`, label: item.Criterio || item.Critério || 'Critério', peso: item.Peso || 1
                    }));
                    localStorage.setItem('acad_criterios', JSON.stringify(criteriosConfig));
                }
                renderCriteriosForm();
                alert("Configuração atualizada com sucesso!");
            };
            reader.readAsArrayBuffer(e.target.files[0]);
        });

        // Inicialização garantida
        document.addEventListener('DOMContentLoaded', () => {
            renderCriteriosForm();
            // Roteamento
            if(new URLSearchParams(window.location.search).has('gId')) {
                document.getElementById('view-professor').classList.add('d-none');
                document.getElementById('view-aluno').classList.remove('d-none');
            }
        });
        
        function gerarTokenAluno(e) { e.preventDefault(); alert("Token gerado!"); }
    </script>
</body>
</html>
